<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>闽碳途</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #000;
}
.container {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    max-width: 480px;
    height: 100vh;
    overflow: hidden;
}
.container.transparent-bg {
    background: transparent !important;
}
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
}
.page.active {
    display: block;
    opacity: 1;
}
/* 图片按钮通用样式（新增7个按钮兼容） */
.start-btn, .start-btn2, .start-btn3, .start-btn4, .start-btn5, .start-btn6,
.start-btn7, .start-btn8, .start-btn9, .start-btn10, .start-btn11, .start-btn12, .start-btn13 {
    display: block;
    object-fit: cover;
    border: none;
    outline: none;
    transition: all 0.3s ease;
    border-radius: 10px;
    cursor: pointer;
}
/* 图片按钮通用样式（保留不变，仅删除原悬浮按压） */
.start-btn, .start-btn2, .start-btn3, .start-btn4, .start-btn5, .start-btn6,
.start-btn7, .start-btn8, .start-btn9, .start-btn10, .start-btn11, .start-btn12, .start-btn13 {
    display: block;
    object-fit: cover;
    border: none;
    outline: none;
    transition: all 0.3s ease;
    border-radius: 10px;
    cursor: pointer;
}

/* ===================== 统一悬浮+按压效果（视觉比例一致） ===================== */
/* 按钮1-6：无基础缩放 → 悬浮1.1倍，按压0.94倍 */
.start-btn:hover {transform: scale(1.1);}
.start-btn:active {transform: scale(0.94);}
.start-btn2:hover {transform: scale(1.1);}
.start-btn2:active {transform: scale(0.94);}
.start-btn3:hover {transform: scale(1.1);}
.start-btn3:active {transform: scale(0.94);}
.start-btn4:hover {transform: scale(1.1);}
.start-btn4:active {transform: scale(0.94);}
.start-btn5:hover {transform: scale(1.1);}
.start-btn5:active {transform: scale(0.94);}
.start-btn6:hover {transform: scale(1.1);}
.start-btn6:active {transform: scale(0.94);}

/* 按钮7-9：基础scale(0.6) → 悬浮0.66倍(0.6×1.1)，按压0.564倍(0.6×0.94) */
.start-btn7:hover {transform: scale(0.66);}
.start-btn7:active {transform: scale(0.564);}
.start-btn8:hover {transform: scale(0.66);}
.start-btn8:active {transform: scale(0.564);}
.start-btn9:hover {transform: scale(0.66);}
.start-btn9:active {transform: scale(0.564);}

/* 按钮10-11：基础scale(1.7) → 悬浮1.87倍(1.7×1.1)，按压1.598倍(1.7×0.94) */
.start-btn10:hover {transform: scale(1.87);}
.start-btn10:active {transform: scale(1.598);}
.start-btn11:hover {transform: scale(1.87);}
.start-btn11:active {transform: scale(1.598);}

/* 按钮12-13：基础scale(0.5) → 悬浮0.55倍(0.5×1.1)，按压0.47倍(0.5×0.94) */
.start-btn12:hover {transform: scale(0.55);}
.start-btn12:active {transform: scale(0.47);}
.start-btn13:hover {transform: scale(0.55);}
.start-btn13:active {transform: scale(0.47);}

/* 按钮7-聊天 */
.start-btn7 {
    position: absolute;
    bottom: -0.6%;  
    left: 3%;   
    width: 22%;   
    height: 11%;  
    transform: scale(0.6); 
}

/* 按钮2-排行榜 */
.start-btn2 {
    position: absolute;
    bottom: 2%;   
    left: 29%;   
    width: 17%;    
    height: 6%;   
}

/* 按钮8-拍照 */
.start-btn8 {
    position: absolute;
    bottom: -0.2%;  
    left: 49.3%;   
    width: 24%;   
    height: 10%; 
    transform: scale(0.6);  
}

/* 按钮9-我的 */
.start-btn9 {
    position: absolute;
    bottom: -1%;  
    left: 74%;   
    width: 22%;   
    height: 13%;  
    transform: scale(0.6); 
}

/* 按钮5-书包 */
.start-btn5 {
    position: absolute;
    bottom: 12%;  
    left: 2%;   
    width: 11%;    
    height: 6%;   
}

/* 按钮1-书籍 */
.start-btn {
    position: absolute;
    bottom: -5%;    
    left: 3%;    
    width: 40%;   
    height: 30%;  
}

/* 按钮6-房子 */
.start-btn6 {
    position: absolute;
    bottom: 26%;  
    left: 1%;   
    width: 37%;   
    height: 20%;  
}

/* 按钮10-碳牌收益所 */
.start-btn10 {
    position: absolute;
    bottom: 23%;  
    left: 70%;   
    width: 22%;   
    height: 10%;  
    transform: scale(1.7); 
}

/* 按钮3-超市 */
.start-btn3 {
    position: absolute;
    bottom: 47%;  
    left: 0%;   
    width: 39%;   
    height: 15%;  
}

/* 按钮11-市政厅 */
.start-btn11 {
    position: absolute;
    bottom: 48%;  
    left: 69%;   
    width: 20%;   
    height: 12%; 
    transform: scale(1.7); 
}

/* 按钮4-工厂 */
.start-btn4 {
    position: absolute;
    bottom: 63%;  
    left: 38%;   
    width: 46%;   
    height: 18%;  
}

/* 按钮12-碳牌加 */
.start-btn12 {
    position: absolute;
    bottom: 91.5%;   
    left: 30%;   
    width: 50%;   
    height: 8%;  
    transform: scale(0.5);
}

/* 按钮13-叶子加 */
.start-btn13 {
    position: absolute;
    bottom: 92%;  
    left: 56%;   
    width: 50%;   
    height: 8%;  
    transform: scale(0.5);
}

/* 关闭按钮（不变） */
.close-btn {
    position: absolute;
    cursor: pointer;
    display: none;
    object-fit: cover;
    border: none;
    outline: none;
    transition: all 0.3s ease;
    border-radius: 50%;
}
.close-btn:hover {transform: scale(1.15);}
.close-btn:active {transform: scale(0.9);}

/* 点击波纹动画（不变） */
.ripple {
    position: absolute;
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
}
@keyframes rippleAnim {
    to {transform: scale(3);opacity: 0;}
}
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <!-- 原有页面 -->
    <img id="page1" class="page active" src="./img1.png">
    <img id="page2" class="page" src="./jinchahua.png">
    <img id="page4" class="page" src="./img3.png">
    <img id="page5" class="page" src="./img2.png">
    <img id="page6" class="page" src="./img4.png">
    <img id="page7" class="page" src="./img4.png">//书包
    <img id="page8" class="page" src="./img4.pn">//不知道
    <!-- 新增7个页面（page9~page15） -->
    <img id="page9" class="page" src="./img5.png">//聊天
    <img id="page10" class="page" src="./img5.png">//拍照
    <img id="page11" class="page" src="./img5.png">//我的
    <img id="page12" class="page" src="./img5.png">//碳牌收益所
    <img id="page13" class="page" src="./img5.png">//市政厅
    <img id="page14" class="page" src="./img5.png">//碳牌
    <img id="page15" class="page" src="./img11.jpg">//叶子

    <!-- 原有6个按钮 -->
    <img id="startBtn" class="start-btn" onclick="nextPage(); createRipple(this)" src="./Button1.png">
    <img id="startBtn2" class="start-btn2" onclick="goToPage4(); createRipple(this)" src="./Button2.png">
    <img id="startBtn3" class="start-btn3" onclick="goToPage5(); createRipple(this)" src="./Button3.png">
    <img id="startBtn4" class="start-btn4" onclick="goToPage6(); createRipple(this)" src="./Button4.png">
    <img id="startBtn5" class="start-btn5" onclick="goToPage7(); createRipple(this)" src="./Button5.png">
    <img id="startBtn6" class="start-btn6" onclick="goToPage8(); createRipple(this)" src="./Button6.png">
    <!-- 新增7个按钮（对应page9~15） -->
    <img id="startBtn7" class="start-btn7" onclick="goToPage9(); createRipple(this)" src="./Button7.png">
    <img id="startBtn8" class="start-btn8" onclick="goToPage10(); createRipple(this)" src="./Button8.png">
    <img id="startBtn9" class="start-btn9" onclick="goToPage11(); createRipple(this)" src="./Button9.png">
    <img id="startBtn10" class="start-btn10" onclick="goToPage12(); createRipple(this)" src="./Button10.png">
    <img id="startBtn11" class="start-btn11" onclick="goToPage13(); createRipple(this)" src="./Button11.png">
    <img id="startBtn12" class="start-btn12" onclick="goToPage14(); createRipple(this)" src="./Button12.png">
    <img id="startBtn13" class="start-btn13" onclick="goToPage15(); createRipple(this)" src="./Button13.png">

    <!-- 关闭按钮（不变） -->
    <img id="closeBtn" class="close-btn" onclick="goHome()">
</div>

<script>
let currentPage = 1;
const mainContainer = document.getElementById("mainContainer");
const closeBtn = document.getElementById("closeBtn");

// 关闭按钮配置（新增page9~15）
const closeBtnConfig = {
    2: { 
        top: "25%", right: "4%", src: "./Return2_Notebook.png", width: "9%", height: "5.25%"
    },
    4: { 
        top: "4.6%", left: "2%", transform: "translateY(-50%)", src: "./Return4_Rank.png", width: "9%", height: "5.25%"
    },
    5: { 
        bottom: "92.5%", right: "86%", src: "./Return5_Surpermarket.png", width: "9.9%", height: "5.775%"
    },
    6: { 
        top: "2%", left: "4%", src: "./Return6_Factory.png", width: "9.9%", height: "5.775%"
    },
    7: { 
        bottom: "8%", left: "8%", src: "./Return7_Bag.png", width: "6%", height: "3.5%"
    },
    8: { 
        top: "50%", right: "5%", transform: "translateY(-50%)", src: "./Return8_Home.png", width: "6%", height: "3.5%"
    },
    // 新增7个页面返回按钮配置
    9: { 
        top: "4%", right: "86%", src: "./Return9_Chat.png", width: "9.9%", height: "5.775%"
    },//聊天
    10: { 
        top: "4%", right: "86%", src: "./Return10_Camera.png", width: "9.9%", height: "5.775%"
    },//拍照
    11: { 
        top: "4%", right: "86%", src: "./Return11_My.png", width: "9.9%", height: "5.775%"
    },//我的
    12: { 
        top: "50%", left: "10%", transform: "translateY(-50%)", src: "./Return12_Income_Institute.png", width: "6%", height: "3.5%"
    },//收益所
    13: { 
        top: "50%", right: "10%", transform: "translateY(-50%)", src: "./Return.png", width: "6%", height: "3.5%"
    },
    14: { 
        bottom: "5%", left: "10%", src: "./Return.png", width: "6%", height: "3.5%"
    },
    15: { 
        top: "15%", left: "15%", src: "./Return.png", width: "6%", height: "3.5%"
    }
};

// 点击波纹动画（不变）
function createRipple(btn) {
    let ripple = document.createElement("div");
    ripple.classList.add("ripple");
    let rect = btn.getBoundingClientRect();
    ripple.style.left = (event.clientX - rect.left - 30) + "px";
    ripple.style.top = (event.clientY - rect.top - 30) + "px";
    btn.appendChild(ripple);
    setTimeout(() => {btn.removeChild(ripple);}, 600);
}

// 页面更新（兼容新增按钮）
function updatePage() {
    document.querySelectorAll('.page').forEach(p => {p.classList.remove('active');});
    document.getElementById('page' + currentPage).classList.add('active');
    mainContainer.classList.toggle('transparent-bg', currentPage !== 1);
    
    // 初始页显示所有按钮，子页隐藏所有按钮
    let btnDisplay = currentPage === 1 ? 'block' : 'none';
    // 原有按钮
    document.getElementById('startBtn').style.display = btnDisplay;
    document.getElementById('startBtn2').style.display = btnDisplay;
    document.getElementById('startBtn3').style.display = btnDisplay;
    document.getElementById('startBtn4').style.display = btnDisplay;
    document.getElementById('startBtn5').style.display = btnDisplay;
    document.getElementById('startBtn6').style.display = btnDisplay;
    // 新增7个按钮
    document.getElementById('startBtn7').style.display = btnDisplay;
    document.getElementById('startBtn8').style.display = btnDisplay;
    document.getElementById('startBtn9').style.display = btnDisplay;
    document.getElementById('startBtn10').style.display = btnDisplay;
    document.getElementById('startBtn11').style.display = btnDisplay;
    document.getElementById('startBtn12').style.display = btnDisplay;
    document.getElementById('startBtn13').style.display = btnDisplay;

    // 关闭按钮逻辑（不变）
    if (currentPage !== 1) {
        closeBtn.style.display = 'block';
        closeBtn.style.top = 'auto';
        closeBtn.style.left = 'auto';
        closeBtn.style.right = 'auto';
        closeBtn.style.bottom = 'auto';
        closeBtn.style.transform = 'none';
        closeBtn.style.width = '';
        closeBtn.style.height = '';
        
        let config = closeBtnConfig[currentPage];
        for (let key in config) {
            if (key === 'src') {
                closeBtn.src = config[key];
            } else {
                closeBtn.style[key] = config[key];
            }
        }
    } else {
        closeBtn.style.display = 'none';
    }
}

// 原有页面跳转（不变）
function nextPage() { currentPage = 2; updatePage(); }
function goToPage4() { currentPage = 4; updatePage(); }
function goToPage5() { currentPage = 5; updatePage(); }
function goToPage6() { currentPage = 6; updatePage(); }
function goToPage7() { currentPage = 7; updatePage(); }
function goToPage8() { currentPage = 8; updatePage(); }
// 新增7个页面跳转
function goToPage9() { currentPage = 9; updatePage(); }
function goToPage10() { currentPage = 10; updatePage(); }
function goToPage11() { currentPage = 11; updatePage(); }
function goToPage12() { currentPage = 12; updatePage(); }
function goToPage13() { currentPage = 13; updatePage(); }
function goToPage14() { currentPage = 14; updatePage(); }
function goToPage15() { currentPage = 15; updatePage(); }

// 返回首页（不变）
function goHome() { currentPage = 1; updatePage(); }

updatePage();
</script>
</body>
</html>
