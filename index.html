<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>闽碳途</title>
<style>
body {
    margin: 0;
    overflow: hidden;
}
.container {
    position: relative;
    width: 100vw;
    height: 100vh;
}
.container.transparent-bg {
    background: transparent !important;
}
/* 页面淡入淡出动画 */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
}
.page.active {
    display: block;
    opacity: 1;
}

/* 按钮通用：高亮 + 动画过渡 */
.start-btn, .start-btn2, .start-btn3, .start-btn4, .start-btn5, .start-btn6 {
    transition: all 0.3s ease;
    box-shadow: 0 0 18px rgba(255, 230, 0, 0.85); /* 初始高亮发光 */
    border-radius: 10px;
}

/* 悬浮效果：放大 + 增强高亮 */
.start-btn:hover, .start-btn2:hover, .start-btn3:hover, 
.start-btn4:hover, .start-btn5:hover, .start-btn6:hover {
    transform: scale(1.08);
    box-shadow: 0 0 28px rgba(255, 235, 0, 1);
}

/* 点击效果：缩小 + 反馈 */
.start-btn:active, .start-btn2:active, .start-btn3:active, 
.start-btn4:active, .start-btn5:active, .start-btn6:active {
    transform: scale(0.94);
    box-shadow: 0 0 10px rgba(255, 235, 0, 0.6);
}

/* 每个按钮原始位置保留不动 */
.start-btn {
    position: absolute;
    bottom: 3px;    
    left: 631px;    
    width: 180px;   
    height: 180px;  
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.start-btn2 {
    position: absolute;
    bottom: 17px;   
    left: 761px;   
    width: 60px;    
    height: 60px;   
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.start-btn3 {
    position: absolute;
    bottom: 450px;  
    left: 615px;   
    width: 160px;   
    height: 130px;  
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.start-btn4 {
    position: absolute;
    bottom: 589px;  
    left: 804px;   
    width: 210px;   
    height: 160px;  
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.start-btn5 {
    position: absolute;
    bottom: 110px;  
    left: 615px;   
    width: 60px;    
    height: 60px;   
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}
.start-btn6 {
    position: absolute;
    bottom: 259px;  
    left: 612px;   
    width: 170px;   
    height: 150px;  
    cursor: pointer;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}

/* 关闭按钮样式 + 动画 */
.close-btn {
    position: absolute;
    cursor: pointer;
    display: none;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    border: none;
    transition: all 0.3s ease;
    border-radius: 50%;
}
.close-btn:hover {
    transform: scale(1.15);
}
.close-btn:active {
    transform: scale(0.9);
}

/* 点击波纹动画 */
.ripple {
    position: absolute;
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
}
@keyframes rippleAnim {
    to {
        transform: scale(3);
        opacity: 0;
    }
}
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <img id="page1" class="page active" src="./Photos/img1.png">
    <img id="page2" class="page" src="./Photos/jinchahua.png">
    <img id="page4" class="page" src="./Photos/img3.jpg">
    <img id="page5" class="page" src="./Photos/img2.jpg">
    <img id="page6" class="page" src="./Photos/img4.jpg">
    <img id="page7" class="page" src="./Photos/img4.jpg">
    <img id="page8" class="page" src="./Photos/img4.jpg">

    <!-- 6个按钮（保留原有路径 + 加入点击效果） -->
    <div id="startBtn" class="start-btn" onclick="playClickSound(); nextPage(); createRipple(this)" 
         style="background-image: url('./Photos/Button1.png')"></div>

    <div id="startBtn2" class="start-btn2" onclick="playClickSound(); goToPage4(); createRipple(this)" 
         style="background-image: url('./Photos/Button2.png')"></div>

    <div id="startBtn3" class="start-btn3" onclick="playClickSound(); goToPage5(); createRipple(this)" 
         style="background-image: url('./Photos/Button3.png')"></div>

    <div id="startBtn4" class="start-btn4" onclick="playClickSound(); goToPage6(); createRipple(this)" 
         style="background-image: url('./Photos/Button4.png')"></div>

    <div id="startBtn5" class="start-btn5" onclick="playClickSound(); goToPage7(); createRipple(this)" 
         style="background-image: url('./Photos/Button5.png')"></div>

    <div id="startBtn6" class="start-btn6" onclick="playClickSound(); goToPage8(); createRipple(this)" 
         style="background-image: url('./Photos/Button6.png')"></div>

    <div id="closeBtn" class="close-btn" onclick="playClickSound(); goHome()"></div>
</div>

<!-- 点击音效（在线音频，不用本地） -->
<audio id="clickSound" src="https://assets.mixkit.co/sfx/25624/mixkit-select-click-1109.mp3" preload="auto">

<script>
let currentPage = 1;
const mainContainer = document.getElementById("mainContainer");
const closeBtn = document.getElementById("closeBtn");
const clickSound = document.getElementById("clickSound");

// 关闭按钮配置（保留不动）
const closeBtnConfig = {
    2: { 
        top: "230px",
        right: "610px",
        backgroundImage: "url('./Photos/Return1.png')",
        width: "50px",
        height: "50px"
    },
    4: { 
        top: "50%",
        left: "30px",
        transform: "translateY(-50%)",
        backgroundImage: "url('./Photos/Return.png')",
        width: "50px",
        height: "50px"
    },
    5: { 
        bottom: "40px",
        right: "50px",
        backgroundImage: "url('./Photos/Return.png')",
        width: "50px",
        height: "50px"
    },
    6: { 
        top: "5px",
        left: "1200px",
        backgroundImage: "url('./Photos/Return6.png')",
        width: "50px",
        height: "50px"
    },
    7: { 
        bottom: "60px",
        left: "60px",
        backgroundImage: "url('./Photos/Return.png')",
        width: "50px",
        height: "50px"
    },
    8: { 
        top: "50%",
        right: "30px",
        transform: "translateY(-50%)",
        backgroundImage: "url('./Photos/Return.png')",
        width: "50px",
        height: "50px"
    }
};

// 播放点击音效
function playClickSound() {
    clickSound.currentTime = 0;
    clickSound.play().catch(err => {});
}

// 创建点击波纹动画
function createRipple(btn) {
    let ripple = document.createElement("div");
    ripple.classList.add("ripple");
    let rect = btn.getBoundingClientRect();
    ripple.style.left = (event.clientX - rect.left - 30) + "px";
    ripple.style.top = (event.clientY - rect.top - 30) + "px";
    btn.appendChild(ripple);
    setTimeout(() => {
        btn.removeChild(ripple);
    }, 600);
}

// 页面更新（淡入淡出）
function updatePage() {
    document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
    });
    document.getElementById('page' + currentPage).classList.add('active');
    mainContainer.classList.toggle('transparent-bg', currentPage !== 1);

    let btnDisplay = currentPage === 1 ? 'block' : 'none';
    document.getElementById('startBtn').style.display = btnDisplay;
    document.getElementById('startBtn2').style.display = btnDisplay;
    document.getElementById('startBtn3').style.display = btnDisplay;
    document.getElementById('startBtn4').style.display = btnDisplay;
    document.getElementById('startBtn5').style.display = btnDisplay;
    document.getElementById('startBtn6').style.display = btnDisplay;

    if (currentPage !== 1) {
        closeBtn.style.display = 'block';
        closeBtn.style.top = 'auto';
        closeBtn.style.left = 'auto';
        closeBtn.style.right = 'auto';
        closeBtn.style.bottom = 'auto';
        closeBtn.style.transform = 'none';
        closeBtn.style.backgroundImage = '';
        closeBtn.style.width = '';
        closeBtn.style.height = '';
        let config = closeBtnConfig[currentPage];
        for (let key in config) {
            closeBtn.style[key] = config[key];
        }
    } else {
        closeBtn.style.display = 'none';
    }
}

// 页面跳转函数（不动）
function nextPage() { currentPage = 2; updatePage(); }
function goToPage4() { currentPage = 4; updatePage(); }
function goToPage5() { currentPage = 5; updatePage(); }
function goToPage6() { currentPage = 6; updatePage(); }
function goToPage7() { currentPage = 7; updatePage(); }
function goToPage8() { currentPage = 8; updatePage(); }
function goHome() { currentPage = 1; updatePage(); }

updatePage();
</script>
</body>
</html>
